$kind: http-request
method: POST
url: '{{base_url}}/api/docs/upload'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
body:
  type: formdata
  content:
    - key: document
      type: file
      src: ''
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const res = pm.response.json();
      if (res.id) pm.collectionVariables.set('doc_id', res.id);
